apis:
  - aid: liquid-ai:platform
    name: Liquid AI Platform API
    description: >-
      Hosted inference and customization API for the LFM family. Includes Liquid Playground
      and LEAP customization/deployment platform. LFM models also distributed on Hugging Face
      and via OpenRouter for hosted inference (e.g. LFM2-24B-A2B at $0.03/M input,
      $0.12/M output; LFM2.5-1.2B-Instruct/Thinking free).
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
